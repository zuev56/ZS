global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus-rpi5'
    static_configs:
      - targets: ['192.168.1.104:9090']

  - job_name: 'raspberry-pi-5'
    static_configs:
      - targets: ['192.168.1.104:9100'] # NODE_EXPORTER_PORT

  - job_name: 'cadvisor-rpi5'
    static_configs:
      - targets: ['192.168.1.104:8085']

  - job_name: 'cadvisor-rpi4'
    static_configs:
      - targets: ['192.168.1.105:8085']

  - job_name: 'kafka-rpi5'
    static_configs:
      - targets: ['192.168.1.104:9308']

  - job_name: 'raspberry-pi-4'
    static_configs:
      - targets: ['192.168.1.105:9100'] # NODE_EXPORTER_PORT

  - job_name: 'nano-pi-router'
    scrape_interval: 5s
    static_configs:
      - targets: ['192.168.1.1:9100']
