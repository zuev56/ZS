global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'raspi5-prometheus'
    static_configs:
      - targets: ['192.168.1.104:9090'] # PROMETHEUS_PORT

  - job_name: 'raspi5-node-exporter'
    static_configs:
      - targets: ['192.168.1.104:9100'] # NODE_EXPORTER_PORT

  - job_name: 'raspi5-cadvisor'
    static_configs:
      - targets: ['192.168.1.104:8085'] # CADVISOR_PORT

  - job_name: 'raspi5-kafka'
    static_configs:
      - targets: ['192.168.1.104:9308']

  - job_name: 'raspi4-node-exporter'
    static_configs:
      - targets: ['192.168.1.102:9100'] # NODE_EXPORTER_PORT

  - job_name: 'nano-pi-node-exporter'
    scrape_interval: 5s
    static_configs:
      - targets: ['192.168.1.1:9100']
